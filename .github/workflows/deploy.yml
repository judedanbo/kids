name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Only one deploy per ref in flight at a time; cancel superseded runs so the
# latest commit is always what ends up on the preview / production URL.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  deployments: write
  pull-requests: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build and deploy to Cloudflare Pages
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared types
        run: pnpm --filter @kids-games-zone/shared build

      - name: Build platform
        run: pnpm build

      - name: Deploy to Cloudflare Pages
        id: cloudflare
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: kids-games-zone
          directory: platform/dist
          # main -> production; everything else -> preview deployment on the
          # same project, surfaced as a branch alias URL on the PR.
          branch: ${{ github.head_ref || github.ref_name }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
